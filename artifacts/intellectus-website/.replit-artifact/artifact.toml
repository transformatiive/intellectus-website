kind = "web"
previewPath = "/"
title = "Intellectus Website"
version = "1.0.0"
id = "artifacts/intellectus-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25744

[services.development]
run = "pnpm --filter @workspace/intellectus-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/intellectus-website", "run", "build" ]
publicDir = "artifacts/intellectus-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25744"
BASE_PATH = "/"
